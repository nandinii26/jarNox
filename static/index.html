<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Financial Data Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #16324f;
      --muted: #5f6c7b;
      --accent: #ff7b00;
      --accent-2: #2a9d8f;
      --border: #d8e0ea;
      --danger: #d00000;
      --shadow: 0 10px 25px rgba(22, 50, 79, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 10% 10%, #ffffff 0%, #eaf1f8 35%, #dce7f2 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    .topbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #16324f 0%, #264f77 60%, #2a9d8f 100%);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: 0.3px;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 12px;
      max-height: calc(100vh - 110px);
      overflow: auto;
    }

    .sidebar h2 {
      margin: 6px 8px 12px;
      font-size: 1rem;
      color: var(--muted);
    }

    .company-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .company-btn:hover,
    .company-btn.active {
      border-color: var(--accent);
      background: #fff6ec;
      transform: translateX(2px);
    }

    .content {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      padding: 12px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 8px;
    }

    select, button {
      border: 1px solid var(--border);
      background: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      color: var(--ink);
      font-weight: 600;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
    }

    button.secondary {
      background: var(--accent-2);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 10px;
      padding: 8px;
    }

    .stat-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fbfdff;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .chart-wrap {
      padding: 12px;
      height: 420px;
    }

    .error {
      color: var(--danger);
      font-weight: 600;
      margin: 8px 12px;
      min-height: 24px;
    }

    .top-insights {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 10px;
      padding: 0 8px 8px;
    }

    .insight {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fefefe;
      font-size: 0.9rem;
    }

    .insight b {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { max-height: 260px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .top-insights { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    function formatCurrency(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) {
        return "-";
      }
      return Number(value).toLocaleString("en-IN", { maximumFractionDigits: 2 });
    }

    async function getJson(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Request failed (${response.status}) for ${path}`);
      }
      return response.json();
    }

    function App() {
      const [companies, setCompanies] = useState([]);
      const [selectedSymbol, setSelectedSymbol] = useState("");
      const [compareSymbol, setCompareSymbol] = useState("");
      const [days, setDays] = useState(30);
      const [summary, setSummary] = useState(null);
      const [series, setSeries] = useState([]);
      const [compareResult, setCompareResult] = useState("");
      const [error, setError] = useState("");
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      const availableCompareSymbols = useMemo(() => {
        return companies.filter((c) => c.symbol !== selectedSymbol);
      }, [companies, selectedSymbol]);

      useEffect(() => {
        async function bootstrap() {
          try {
            setError("");
            const list = await getJson("/companies");
            setCompanies(list);
            if (list.length > 0) {
              setSelectedSymbol(list[0].symbol);
              if (list.length > 1) {
                setCompareSymbol(list[1].symbol);
              }
            }
          } catch (err) {
            setError(err.message);
          }
        }
        bootstrap();
      }, []);

      useEffect(() => {
        if (!selectedSymbol) {
          return;
        }

        async function loadSymbolData() {
          try {
            setError("");
            setCompareResult("");
            const [summaryData, seriesData] = await Promise.all([
              getJson(`/summary/${selectedSymbol}`),
              getJson(`/data/${selectedSymbol}?days=${days}`),
            ]);
            setSummary(summaryData);
            setSeries(seriesData);
          } catch (err) {
            setError(err.message);
          }
        }

        loadSymbolData();
      }, [selectedSymbol, days]);

      useEffect(() => {
        if (!canvasRef.current || series.length === 0 || !selectedSymbol) {
          return;
        }

        const labels = series.map((d) => d.date);
        const close = series.map((d) => d.close);
        const ma7 = series.map((d) => d.ma_7);

        if (chartRef.current) {
          chartRef.current.destroy();
        }

        chartRef.current = new Chart(canvasRef.current, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: `${selectedSymbol} Close`,
                data: close,
                borderColor: "#ff7b00",
                backgroundColor: "rgba(255, 123, 0, 0.10)",
                pointRadius: 0,
                tension: 0.2,
              },
              {
                label: `${selectedSymbol} MA(7)`,
                data: ma7,
                borderColor: "#2a9d8f",
                backgroundColor: "rgba(42, 157, 143, 0.10)",
                pointRadius: 0,
                tension: 0.2,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { position: "top" },
            },
            scales: {
              x: { ticks: { maxTicksLimit: 8 } },
            },
          },
        });

        return () => {
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
        };
      }, [series, selectedSymbol]);

      async function runCompare() {
        if (!selectedSymbol || !compareSymbol || selectedSymbol === compareSymbol) {
          setError("Choose two different symbols for comparison.");
          return;
        }

        try {
          setError("");
          const cmp = await getJson(`/compare?symbol1=${selectedSymbol}&symbol2=${compareSymbol}&days=${days}`);
          setCompareResult(
            `Winner: ${cmp.winner} | Corr: ${cmp.correlation_close.toFixed(3)} | ` +
            `${cmp.symbol1}: ${(cmp.cumulative_return_symbol1 * 100).toFixed(2)}% | ` +
            `${cmp.symbol2}: ${(cmp.cumulative_return_symbol2 * 100).toFixed(2)}%`
          );
        } catch (err) {
          setError(err.message);
        }
      }

      function renderInsights() {
        if (!series || series.length < 2) {
          return null;
        }

        const latest = series[series.length - 1];
        const previous = series[series.length - 2];
        const momentum = previous.close === 0 ? 0 : ((latest.close - previous.close) / previous.close) * 100;
        const trend = momentum >= 0 ? "Upward" : "Downward";

        return (
          <div className="top-insights">
            <div className="insight">
              <b>Volatility Score</b>
              {latest.volatility_score.toFixed(4)}
            </div>
            <div className="insight">
              <b>1-Day Momentum</b>
              {momentum.toFixed(2)}% ({trend})
            </div>
          </div>
        );
      }

      return (
        <>
          <div className="topbar">
            <h1>Mini Financial Data Platform </h1>
          </div>

          <div className="layout">
            <aside className="panel sidebar">
              <h2>Companies</h2>
              {companies.map((c) => (
                <button
                  key={c.symbol}
                  className={`company-btn ${c.symbol === selectedSymbol ? "active" : ""}`}
                  onClick={() => setSelectedSymbol(c.symbol)}
                >
                  {c.symbol} - {c.name}
                </button>
              ))}
            </aside>

            <main className="panel content">
              <div className="toolbar">
                <label htmlFor="range">Range:</label>
                <select id="range" value={days} onChange={(e) => setDays(Number(e.target.value))}>
                  <option value={30}>Last 30 days</option>
                  <option value={90}>Last 90 days</option>
                  <option value={180}>Last 180 days</option>
                </select>

                <label htmlFor="compareSymbol">Compare with:</label>
                <select
                  id="compareSymbol"
                  value={compareSymbol}
                  onChange={(e) => setCompareSymbol(e.target.value)}
                >
                  {availableCompareSymbols.map((c) => (
                    <option key={c.symbol} value={c.symbol}>
                      {c.symbol}
                    </option>
                  ))}
                </select>

                <button className="secondary" onClick={runCompare}>Compare</button>
              </div>

              <div className="stats">
                <div className="stat-card">
                  <div className="stat-label">52W High</div>
                  <div className="stat-value">{summary ? formatCurrency(summary.high_52w) : "-"}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">52W Low</div>
                  <div className="stat-value">{summary ? formatCurrency(summary.low_52w) : "-"}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Avg Close</div>
                  <div className="stat-value">{summary ? formatCurrency(summary.average_close) : "-"}</div>
                </div>
              </div>

              {renderInsights()}
              <div className="error">{error || compareResult}</div>
              <div className="chart-wrap">
                <canvas ref={canvasRef}></canvas>
              </div>
            </main>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
